name: Build & Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .exe
        run: pip install pillow; pyinstaller --onefile --windowed --name="Claude" --icon=claude.ico --hidden-import=browser_launcher claude_app.py

      - name: Prepare dist_py
        run: New-Item -ItemType Directory -Path dist_py -Force; Copy-Item dist/Claude.exe dist_py/Claude.exe

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Build Installer
        run: iscc claude_installer.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist_py/Claude.exe
            dist_installer/Claude-Desktop-Setup.exe
          generate_release_notes: true
